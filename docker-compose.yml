services:
  db:
    image: postgres:15-alpine
    container_name: buzzticket-db
    environment:
      POSTGRES_DB: buzzticket
      POSTGRES_USER: ${DB_USERNAME?Variable DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD?Variable DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d buzzticket" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:


