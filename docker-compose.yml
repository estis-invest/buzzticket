services:
  db:
    image: postgres:15-alpine
    container_name: buzzticket-db
    environment:
      POSTGRES_DB: ${DB_NAME?Variable DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME?Variable DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD?Variable DB_PASSWORD is required}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
