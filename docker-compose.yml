services:
  db:
    image: postgres:15-alpine
    container_name: buzzticket-db
    environment:
      POSTGRES_DB: buzzticket
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d buzzticket" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: